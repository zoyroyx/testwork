version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: approval-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: approval_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d approval_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: approval-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/approval_db
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
